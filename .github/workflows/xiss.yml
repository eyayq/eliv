name: Cancel All Workflow Runs

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cancel all workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          PAGE=1

          while true
          do
            echo "Fetching page $PAGE"

            RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/runs?per_page=100&page=$PAGE")

            IDS=$(echo "$RESPONSE" | jq '.workflow_runs[].id')

            if [ -z "$IDS" ]; then
              echo "No more runs."
              break
            fi

            for id in $IDS
            do
              echo "Cancelling run $id"

              curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$OWNER/$REPO/actions/runs/$id/cancel

              sleep 0.2
            done

            PAGE=$((PAGE+1))
          done

          echo "All workflow runs cancelled."
