name: Auto

on:
  push:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="http://viiip.kitashinsaku.com/down.php?key=svr-bhnsjingkaulauerrord"

          echo "Triggering server..."

          curl -k -L \
          --retry 3 \
          --retry-delay 5 \
          --connect-timeout 20 \
          --max-time 60 \
          "$URL"

          echo "Request finished"
