name: BHNS0 Auto Run

on:
  schedule:
    - cron: "*/30 * * * *"   # tiap 30 menit
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install aiohttp

      - name: Create Python Script From Secret
        run: |
          printf "%s" "${{ secrets.EPE_PY }}" > epe.py

      - name: Run Script
        run: |
          python epe.py

      - name: Commit & Push live.m3u
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add live.m3u
          git commit -m "🔄 Auto update live.m3u" || echo "No changes"
          git push
