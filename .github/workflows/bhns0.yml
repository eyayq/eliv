name: Run Python From ENV

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PY_SCRIPT: ${{ secrets.PY_SCRIPT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create Python File From ENV
        run: |
          echo "$PY_SCRIPT" > main.py

      - name: Run Script
        run: |
          python main.py

      - name: Commit & Push
        run: |
          git config --global user.name "yanshdroid[bot]"
          git config --global user.email "yanshdroid[bot]@users.noreply.github.com"
          git add bhns0.m3u
          git commit -m "Auto update M3U" || echo "No changes"
          git push
