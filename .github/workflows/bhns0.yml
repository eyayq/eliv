name: Mybhianesse0

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Create Python Script from Secret
        run: |
          echo "${{ secrets.EPE_PY }}" > epe.py

      - name: Execute Scraper
        run: python epe.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "yanshdroid[bot]@users.noreply.github.com"
          git config --local user.name "yanshdroid[bot]"
          git add live.m3u
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S') WIB" || echo "No changes to commit"
          git push
