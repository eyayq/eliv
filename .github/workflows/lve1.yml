name: lve1 epepwk

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'epepwk.py'
      - '.github/workflows/lve1.yml'

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp unidecode

      - name: Decode Script
        run: |
          echo "${{ secrets.EPEPWK_PY }}" | base64 -d > epepwk.py
          chmod +x epepwk.py

      - name: Create Folder Path
        run: |
          mkdir -p a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z

      - name: Run Script
        run: |
          python3 epepwk.py

      - name: Commit Result
        run: |
          FILE="a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live1.m3u"

          git config --global user.name "yanshdroid[bot]"
          git config --global user.email "yanshdroid[bot]@users.noreply.github.com"

          if [ -f "$FILE" ]; then
            git add "$FILE"
            git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto update $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "live.m3u not found"
          fi
