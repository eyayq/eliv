name: Run

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip >/dev/null 2>&1
          pip install unidecode >/dev/null 2>&1

      - name: Run
        shell: bash
        run: |
          echo "${{ secrets.EPEPWK_PY }}" | base64 --decode | python >/dev/null 2>&1
