name: bhns epepwk

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: EPEPWK_PY

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install aiohttp
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Decode Script
        run: |
          echo "${{ secrets.EPEPWK_PY }}" | base64 --decode > epe.py

      - name: Run Script
        run: |
          python epe.py

      - name: Commit Result
        run: |
          git config --global user.name "yanshdroid[bot]"
          git config --global user.email "yanshdroid[bot]@users.noreply.github.com"
          git add a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live1.m3u || true
          git commit -m "Auto update live1.m3u" || echo "No changes"
          git push
