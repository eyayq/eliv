name: Itc scr

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'jj.py'
      - '.github/workflows/jj.yml'

jobs:
  merge-and-commit:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Decode Python Script
        run: |
          echo "${{ secrets.JJ_PY }}" | base64 -d > jj.py
          chmod +x jj.py

      - name: Run Scr
        run: |
          python jj.py

      - name: Commit Playlist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "yanshdroid[bot]"
          git config --global user.email "yanshdroid[bot]@users.noreply.github.com"

          FILE="a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live1.php"

          if [ -f "$FILE" ]; then
            git add "$FILE"
            git commit -m "Auto update playlist $(date)" || echo "No changes"

            # retry push jika banyak runner
            for i in 1 2 3 4 5 6
            do
              git pull --rebase --autostash origin main
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main && break
              echo "Push failed. retry $i..."
              sleep 5
            done
          else
            echo "live1.php not found"
          fi
