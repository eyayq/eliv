name: Generate Premium M3U

on:
  schedule:
    - cron: "*/5 * * * *"   # jalan tiap 5 menit
  workflow_dispatch:        # bisa run manual juga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Dependencies
        run: |
          pip install requests

      - name: 🔐 Create Python Script from Secret
        run: |
          echo "${{ secrets.PREMIUM_PY }}" > premium.py

      - name: ▶️ Run Script
        run: |
          python premium.py

      - name: 📤 Commit & Push bhns0.m3u
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add bhns0.m3u

          git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update Premium M3U"

          git push
