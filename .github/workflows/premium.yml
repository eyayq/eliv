name: Get Premium

on:
  schedule:
    # Run every hour
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'premium.py'
      - '.github/workflows/premium.yml'

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PREMIUM_PY_B64: ${{ secrets.PREMIUM_PY_B64 }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create Folder Path
        run: |
          mkdir -p a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z

      - name: Decode Python Script
        run: |
          echo "$PREMIUM_PY_B64" | base64 -d > premium.py
          chmod +x premium.py

      - name: Run Script
        run: |
          python premium.py

      - name: Commit M3U
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com'"
          git config --local user.name "github-actions[bot]"

          if [ -f a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live2.m3u ]; then
            git add a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live2.m3u
            git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update Premium M3U"
            git push
          else
            echo "M3U file not found"
          fi
