name: lve0 EPEP PY

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'epep.py'
      - '.github/workflows/lve0.yml'

jobs:
  merge-and-commit:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp unidecode

      - name: Decode Script
        run: |
          echo "${{ secrets.EPEP_PY }}" | base64 -d > epep.py
          chmod +x epep.py

      - name: Create Folder Path
        run: |
          mkdir -p a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z

      - name: Run Script
        run: |
          python3 epep.py

      - name: Commit Result
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/live0.m3u"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f "$FILE" ]; then

            git add "$FILE"

            if ! git diff --cached --quiet; then
              git commit -m "🔄 Auto update $(date +'%Y-%m-%d %H:%M:%S')"
            else
              echo "No changes to commit"
            fi

            git pull --rebase --autostash origin main
            git push origin main

          else
            echo "live0.m3u not found"
          fi
